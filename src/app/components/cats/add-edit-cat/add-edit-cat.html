<h2 mat-dialog-title>{{ data.type==='edit' ? 'Edit Cat' : data.type==='view' ? ' View Cat details' : 'Add
    Cat' }}</h2>
    <mat-divider></mat-divider>
<mat-dialog-content class="mat-typography">
    @if(data.type==='view'){
    <div class="d-flex flex-column justify-content-start">
        <div class="d-flex justify-content-start align-items-center">
            <span class="fw-semibold"> Name </span>: {{data.cat?.info?.name}}
        </div>
        <div class="d-flex justify-content-start align-items-center">
            <span class="fw-semibold">Description </span>: {{data.cat?.info?.description}}
        </div>
        <div class="d-flex justify-content-start align-items-center">
            <span class="fw-semibold">Age:</span> <span>Age: {{data.cat?.info?.age}}</span>
        </div>
    </div>
    }
    @else{
    <form [formGroup]="catForm" class="mt-2">
        <div class="d-flex flex-column">
            <mat-form-field appearance="outline">
                <mat-label>Name</mat-label>
                <input matInput formControlName="name">
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Description</mat-label>
                <input matInput formControlName="description">
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Age</mat-label>
                <input matInput formControlName="age">
            </mat-form-field>
        </div>
    </form>
    }
</mat-dialog-content>
<mat-dialog-actions align="end">

    @if(data.type!=='view'){
    <button matButton cdkFocusInitial (click)="save()" [disabled]="isLoading()">
        <div class="d-flex flex-row">
            Save
            @if(isLoading()){
            <mat-spinner diameter="20"></mat-spinner>
            }
        </div>
    </button>
    }
    <button matButton mat-dialog-close [disabled]="isLoading()">Cancel</button>
</mat-dialog-actions>
